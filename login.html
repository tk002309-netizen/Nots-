<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — StudyVault</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#040d1a;--bg2:#071224;--card:#0b1929;--card2:#0f2035;
  --border:#1a3a5c;--gold:#f0a500;--gold2:#ffd060;--blue:#1e90ff;
  --teal:#00d4aa;--text:#e8f0fe;--muted:#7a9abf;--danger:#ff4b6e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 20%,#0a2a4a66,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 75%,#0a1e3a55,transparent 50%),
    radial-gradient(ellipse 30% 25% at 50% 50%,#f0a50009,transparent 60%);
  pointer-events:none;
}
.logo{
  font-size:1.6rem;font-weight:800;margin-bottom:36px;text-align:center;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;z-index:1;
}
.logo span{-webkit-text-fill-color:var(--blue);}
.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;padding:36px 32px;
}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.tab{
  flex:1;padding:12px;text-align:center;
  font-size:.9rem;font-weight:600;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;
  transition:.2s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;}
.tab-content.active{display:block;}
/* inputs */
.field{margin-bottom:18px;}
.field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:7px;font-weight:600;}
.field input{
  width:100%;padding:13px 16px;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-size:.92rem;
  font-family:'Sora',sans-serif;outline:none;transition:.2s;
}
.field input:focus{border-color:var(--gold)88;}
/* buttons */
.btn{
  width:100%;padding:14px;border-radius:50px;
  font-size:.95rem;font-weight:700;cursor:pointer;border:none;
  transition:.25s;font-family:'Sora',sans-serif;
}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#e08800);
  color:#040d1a;box-shadow:0 0 24px var(--gold)33;margin-bottom:16px;
}
.btn-gold:hover{opacity:.9;transform:translateY(-1px);}
.btn-google{
  background:var(--bg2);border:1.5px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-google:hover{border-color:var(--gold)55;}
/* divider */
.divider{
  display:flex;align-items:center;gap:12px;
  color:var(--muted);font-size:.8rem;margin:16px 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
/* error/success */
.msg{
  padding:10px 14px;border-radius:10px;font-size:.84rem;
  margin-bottom:14px;display:none;
}
.msg.error{background:var(--danger)22;color:var(--danger);border:1px solid var(--danger)44;}
.msg.success{background:var(--teal)22;color:var(--teal);border:1px solid var(--teal)44;}
.msg.show{display:block;}
/* loader */
.loader{
  display:none;width:20px;height:20px;
  border:2px solid #04040410;border-top-color:var(--gold);
  border-radius:50%;animation:spin .6s linear infinite;
  margin:0 auto;
}
.loader.show{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:var(--gold);text-decoration:none;}
a:hover{text-decoration:underline;}
.back{
  position:relative;z-index:1;
  margin-bottom:20px;color:var(--muted);font-size:.85rem;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  text-decoration:none;
}
.back:hover{color:var(--text);}
</style>
</head>
<body>

<a href="index.html" class="back">← Back to Home</a>

<div class="logo">Study<span>Vault</span></div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- LOGIN -->
  <div class="tab-content active" id="tab-login">
    <div class="msg" id="login-msg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="student@email.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••"/>
    </div>
    <div style="text-align:right;margin-bottom:18px;">
      <a href="#" onclick="forgotPass()">Forgot Password?</a>
    </div>
    <button class="btn btn-gold" onclick="doLogin()">Login</button>
    <div class="divider">ya</div>
    <button class="btn btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="loader" id="login-loader"></div>
  </div>

  <!-- SIGNUP -->
  <div class="tab-content" id="tab-signup">
    <div class="msg" id="signup-msg"></div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Rahul Sharma"/>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="student@email.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-pass" placeholder="Min 6 characters"/>
    </div>
    <button class="btn btn-gold" onclick="doSignup()">Create Account</button>
    <div class="divider">ya</div>
    <button class="btn btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="loader" id="signup-loader"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,
  GoogleAuthProvider,signInWithPopup,sendPasswordResetEmail,updateProfile,onAuthStateChanged}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,serverTimestamp}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app=initializeApp({
  apiKey:"AIzaSyDY0lVUA4Ph7wV1MciIE4ICv0Wkn06nHqY",
  authDomain:"clash-code.firebaseapp.com",
  projectId:"clash-code",
  storageBucket:"clash-code.firebasestorage.app",
  messagingSenderId:"167202813766",
  appId:"1:167202813766:web:a2e16409f5b6d5ae569747"
});
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

// redirect if already logged in
onAuthStateChanged(auth,u=>{if(u)window.location.href='dashboard.html';});

window.switchTab=function(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
  document.querySelectorAll('.tab-content').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
};

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;el.className='msg '+type+' show';
}
function setLoading(id,on){document.getElementById(id).className='loader'+(on?' show':'');}

async function saveUser(user,name){
  const ref=doc(db,'users',user.uid);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{
      name:name||user.displayName||user.email.split('@')[0],
      email:user.email,
      photoURL:user.photoURL||'',
      role:'student',
      purchases:[],
      joinedAt:serverTimestamp(),
      lastSeen:serverTimestamp()
    });
  }else{
    // update lastSeen
    await setDoc(ref,{lastSeen:serverTimestamp()},{merge:true});
  }
}

window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass)return showMsg('login-msg','Email aur password dono baro.','error');
  setLoading('login-loader',true);
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    await saveUser(cred.user,'');
    window.location.href='dashboard.html';
  }catch(e){
    setLoading('login-loader',false);
    showMsg('login-msg',friendlyError(e.code),'error');
  }
};

window.doSignup=async function(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pass=document.getElementById('signup-pass').value;
  if(!name)return showMsg('signup-msg','Apna naam likho.','error');
  if(!email)return showMsg('signup-msg','Email likho.','error');
  if(pass.length<6)return showMsg('signup-msg','Password kam se kam 6 characters ka ho.','error');
  setLoading('signup-loader',true);
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    await saveUser(cred.user,name);
    window.location.href='dashboard.html';
  }catch(e){
    setLoading('signup-loader',false);
    showMsg('signup-msg',friendlyError(e.code),'error');
  }
};

window.doGoogle=async function(){
  try{
    const cred=await signInWithPopup(auth,provider);
    await saveUser(cred.user,'');
    window.location.href='dashboard.html';
  }catch(e){
    showMsg('login-msg',friendlyError(e.code),'error');
    showMsg('signup-msg',friendlyError(e.code),'error');
  }
};

window.forgotPass=async function(){
  const email=document.getElementById('login-email').value.trim();
  if(!email)return showMsg('login-msg','Pehle email likho.','error');
  try{
    await sendPasswordResetEmail(auth,email);
    showMsg('login-msg','Reset link send ho gaya! Email check karo.','success');
  }catch(e){showMsg('login-msg',friendlyError(e.code),'error');}
};

function friendlyError(code){
  const map={
    'auth/user-not-found':'Yeh email registered nahi hai.',
    'auth/wrong-password':'Password galat hai.',
    'auth/email-already-in-use':'Yeh email pehle se registered hai.',
    'auth/invalid-email':'Email format sahi nahi hai.',
    'auth/weak-password':'Password kam se kam 6 characters ka ho.',
    'auth/popup-closed-by-user':'Google login cancel ho gaya.',
    'auth/network-request-failed':'Internet connection check karo.',
    'auth/invalid-credential':'Email ya password galat hai.',
  };
  return map[code]||'Kuch galat hua. Dobara try karo.';
}
// Enter key
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const activeTab=document.querySelector('.tab-content.active').id;
    if(activeTab==='tab-login')window.doLogin();
    else window.doSignup();
  }
});
</script>
</body>
</html>
