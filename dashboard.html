<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — StudyVault</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#040d1a;--bg2:#071224;--card:#0b1929;--card2:#0f2035;
  --border:#1a3a5c;--gold:#f0a500;--gold2:#ffd060;--blue:#1e90ff;
  --teal:#00d4aa;--text:#e8f0fe;--muted:#7a9abf;--danger:#ff4b6e;
  --sidebar:260px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── SIDEBAR / DRAWER ── */
.sidebar{
  width:var(--sidebar);min-height:100vh;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:200;transition:.3s;
}
.sidebar-logo{
  padding:24px 20px 20px;
  font-size:1.2rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  border-bottom:1px solid var(--border);
}
.sidebar-logo span{-webkit-text-fill-color:var(--blue);}
.sidebar-user{
  padding:16px 20px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.9rem;color:#040d1a;flex-shrink:0;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.user-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* nav items */
.nav-section{padding:16px 12px 8px;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;margin:2px 8px;
  border-radius:12px;cursor:pointer;
  color:var(--muted);font-size:.9rem;font-weight:500;
  transition:.2s;text-decoration:none;
}
.nav-item:hover{background:var(--card2);color:var(--text);}
.nav-item.active{background:var(--gold)18;color:var(--gold);font-weight:600;}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center;}
/* logout at bottom */
.sidebar-bottom{margin-top:auto;padding:16px;border-top:1px solid var(--border);}
.btn-logout{
  width:100%;padding:10px;border-radius:10px;
  background:var(--danger)18;border:1px solid var(--danger)44;
  color:var(--danger);font-size:.88rem;font-weight:600;cursor:pointer;
  font-family:'Sora',sans-serif;transition:.2s;
}
.btn-logout:hover{background:var(--danger)33;}

/* ── MAIN ── */
.main{
  margin-left:var(--sidebar);flex:1;
  min-height:100vh;display:flex;flex-direction:column;
}
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(4,13,26,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{font-size:1rem;font-weight:700;}
.hamburger{
  display:none;background:none;border:none;
  color:var(--text);font-size:1.4rem;cursor:pointer;padding:8px;
}
.content{padding:28px;flex:1;}

/* ── STATS CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px;
  display:flex;align-items:center;gap:14px;
}
.stat-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  flex-shrink:0;
}
.stat-icon.gold{background:var(--gold)20;border:1px solid var(--gold)33;}
.stat-icon.blue{background:var(--blue)20;border:1px solid var(--blue)33;}
.stat-icon.teal{background:var(--teal)20;border:1px solid var(--teal)33;}
.stat-val{font-size:1.4rem;font-weight:800;}
.stat-lbl{font-size:.75rem;color:var(--muted);}

/* ── SUBJECT CARDS ── */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-hd h2{font-size:1rem;font-weight:700;}
.section-hd a{font-size:.82rem;color:var(--gold);text-decoration:none;}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.subj-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:.3s;text-decoration:none;color:var(--text);
}
.subj-card:hover{border-color:var(--gold)55;transform:translateY(-3px);}
.subj-thumb{width:100%;height:110px;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--card2);}
.subj-body{padding:14px;}
.subj-name{font-size:.9rem;font-weight:700;margin-bottom:6px;}
.subj-row{display:flex;align-items:center;justify-content:space-between;}
.badge{padding:3px 9px;border-radius:50px;font-size:.7rem;font-weight:700;}
.free{background:var(--teal)22;color:var(--teal);border:1px solid var(--teal)44;}
.paid{background:var(--gold)22;color:var(--gold);border:1px solid var(--gold)44;}
.locked{background:var(--muted)22;color:var(--muted);border:1px solid var(--muted)44;}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}

/* skeleton */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200%;animation:sh 1.4s infinite;border-radius:8px;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* overlay for mobile drawer */
.overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:150;}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--card);border:1px solid var(--border);padding:12px 18px;border-radius:12px;font-size:.85rem;box-shadow:0 8px 32px #000a;transform:translateY(60px);opacity:0;transition:.3s;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:768px){
  .sidebar{left:calc(-1 * var(--sidebar));}
  .sidebar.open{left:0;}
  .overlay.show{display:block;}
  .main{margin-left:0;}
  .hamburger{display:block;}
  .content{padding:16px;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">Study<span>Vault</span></div>
  <div class="sidebar-user">
    <div class="avatar" id="avatar-init">S</div>
    <div>
      <div class="user-name" id="user-name">Loading...</div>
      <div class="user-email" id="user-email">—</div>
    </div>
  </div>

  <div class="nav-section">Main Menu</div>
  <a class="nav-item active" href="dashboard.html"><span class="icon">🏠</span>Dashboard</a>
  <a class="nav-item" href="subjects.html"><span class="icon">📚</span>All Subjects</a>
  <a class="nav-item" href="my-subjects.html"><span class="icon">⭐</span>My Subjects</a>

  <div class="nav-section">Account</div>
  <a class="nav-item" href="profile.html"><span class="icon">👤</span>Profile</a>
  <a class="nav-item" href="purchases.html"><span class="icon">🛍️</span>My Purchases</a>

  <div class="sidebar-bottom">
    <button class="btn-logout" id="logout-btn">🚪 Logout</button>
  </div>
</div>

<!-- overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title">Dashboard</div>
    <div style="font-size:.8rem;color:var(--muted)" id="topbar-date"></div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon gold">📚</div>
        <div><div class="stat-val" id="st-subjects">—</div><div class="stat-lbl">Total Subjects</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">⭐</div>
        <div><div class="stat-val" id="st-enrolled">—</div><div class="stat-lbl">Enrolled</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon teal">✅</div>
        <div><div class="stat-val" id="st-free">—</div><div class="stat-lbl">Free Access</div></div>
      </div>
    </div>

    <!-- My subjects -->
    <div class="section-hd">
      <h2>⭐ Meri Subjects</h2>
      <a href="subjects.html">Sab dekho →</a>
    </div>
    <div class="subjects-grid" id="my-subjects">
      <div class="skeleton" style="height:180px;"></div>
      <div class="skeleton" style="height:180px;"></div>
    </div>

    <div style="margin-top:28px;"></div>

    <!-- All subjects -->
    <div class="section-hd">
      <h2>📚 Sab Subjects</h2>
      <a href="subjects.html">Browse All →</a>
    </div>
    <div class="subjects-grid" id="all-subjects">
      <div class="skeleton" style="height:180px;"></div>
      <div class="skeleton" style="height:180px;"></div>
      <div class="skeleton" style="height:180px;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,collection,getDocs,setDoc,serverTimestamp}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app=initializeApp({
  apiKey:"AIzaSyDY0lVUA4Ph7wV1MciIE4ICv0Wkn06nHqY",
  authDomain:"clash-code.firebaseapp.com",
  projectId:"clash-code",
  storageBucket:"clash-code.firebasestorage.app",
  messagingSenderId:"167202813766",
  appId:"1:167202813766:web:a2e16409f5b6d5ae569747"
});
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
let userData=null;

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  // update UI
  const initials=(u.displayName||u.email||'S').charAt(0).toUpperCase();
  document.getElementById('avatar-init').textContent=initials;
  document.getElementById('user-name').textContent=u.displayName||'Student';
  document.getElementById('user-email').textContent=u.email;
  // get user doc
  const snap=await getDoc(doc(db,'users',u.uid));
  userData=snap.data()||{purchases:[]};
  // update session time
  await setDoc(doc(db,'sessions',u.uid),{
    uid:u.uid,lastSeen:serverTimestamp(),email:u.email
  },{merge:true});
  loadData();
});

// Date
const now=new Date();
document.getElementById('topbar-date').textContent=now.toLocaleDateString('hi-IN',{weekday:'long',day:'numeric',month:'long'});

async function loadData(){
  const snap=await getDocs(collection(db,'subjects'));
  const subjects=[];
  snap.forEach(d=>subjects.push({id:d.id,...d.data()}));
  const purchases=userData?.purchases||[];
  const freeSubjs=subjects.filter(s=>s.isFree);
  const mySubjs=subjects.filter(s=>purchases.includes(s.id)||s.isFree);
  document.getElementById('st-subjects').textContent=subjects.length;
  document.getElementById('st-enrolled').textContent=mySubjs.length;
  document.getElementById('st-free').textContent=freeSubjs.length;
  renderGrid('my-subjects',mySubjs,purchases,true);
  renderGrid('all-subjects',subjects.slice(0,6),purchases,false);
}

function renderGrid(id,subjects,purchases,isMine){
  const el=document.getElementById(id);
  if(!subjects.length){
    el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>${isMine?'Abhi koi enrolled subject nahi. Subjects page pe jao!':'Koi subject nahi mila.'}</p></div>`;
    return;
  }
  el.innerHTML=subjects.map(s=>{
    const owned=s.isFree||purchases.includes(s.id);
    return`<a href="subject.html?id=${s.id}" class="subj-card">
      ${s.thumbnail
        ?`<img src="${s.thumbnail}" class="subj-thumb" alt="${s.name}"/>`
        :`<div class="subj-thumb">${s.emoji||'📚'}</div>`}
      <div class="subj-body">
        <div class="subj-name">${s.name}</div>
        <div class="subj-row">
          ${s.isFree?`<span class="badge free">✓ Free</span>`:owned?`<span class="badge paid">✓ Purchased</span>`:`<span class="badge locked">🔒 Premium</span>`}
          <span style="font-size:.82rem;color:var(--gold);font-weight:700">${s.isFree?'Free':'₹'+s.price}</span>
        </div>
        <div style="margin-top:6px;font-size:.75rem;color:var(--muted)">${s.questionCount||0} Questions</div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('logout-btn').onclick=async()=>{
  await signOut(auth);window.location.href='login.html';
};

window.toggleSidebar=function(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
};
window.closeSidebar=function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
};
</script>
</body>
</html>
